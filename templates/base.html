<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Solidis — Appel de Garantie{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Google Sans', Roboto, Arial, sans-serif;
      font-size: 14px;
      color: #202124;
      background: #f8f9fa;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 240px;
      flex-shrink: 0;
      background: #fff;
      border-right: 1px solid #e0e0e0;
      display: flex;
      flex-direction: column;
      padding: 16px 0;
      height: 100vh;
      position: fixed;
      left: 0; top: 0;
    }
    .sidebar-logo {
      padding: 8px 24px 24px;
      font-size: 18px;
      font-weight: 600;
      color: #1a73e8;
      letter-spacing: -0.3px;
    }
    .sidebar-logo span { color: #202124; }
    .sidebar-nav a {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 24px;
      color: #444;
      text-decoration: none;
      border-radius: 0 24px 24px 0;
      margin-right: 16px;
      font-size: 13.5px;
      transition: background .15s;
    }
    .sidebar-nav a:hover  { background: #f1f3f4; }
    .sidebar-nav a.active { background: #e8f0fe; color: #1a73e8; font-weight: 600; }

    /* ── Main ── */
    .main {
      margin-left: 240px;
      flex: 1;
      height: 100vh;
      overflow-y: auto;
      padding: 32px 40px;
    }

    /* ── Carte ── */
    .card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 24px;
    }
    .card-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #202124;
    }

    /* ── Formulaire ── */
    .form-row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
    .form-group { display: flex; flex-direction: column; gap: 4px; }
    label { font-size: 12px; color: #5f6368; font-weight: 500; }
    input[type="date"], input[type="text"], select {
      border: 1px solid #dadce0;
      border-radius: 4px;
      padding: 8px 12px;
      font-size: 14px;
      color: #202124;
      outline: none;
      width: 100%;
    }
    input[type="date"]:focus,
    input[type="text"]:focus,
    select:focus { border-color: #1a73e8; }

    /* ── Boutons ── */
    .btn {
      padding: 9px 20px;
      border-radius: 4px;
      border: none;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s, box-shadow .15s;
    }
    .btn-primary { background: #1a73e8; color: #fff; }
    .btn-primary:hover { background: #1557b0; box-shadow: 0 1px 3px rgba(0,0,0,.2); }
    .btn-sm { padding: 5px 12px; font-size: 12px; }
    .btn-outline { background: #fff; border: 1px solid #dadce0; color: #444; }
    .btn-outline:hover { background: #f1f3f4; }

    /* ── Table ── */
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th {
      text-align: left;
      padding: 10px 12px;
      border-bottom: 2px solid #e0e0e0;
      color: #5f6368;
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .4px;
    }
    td { padding: 10px 12px; border-bottom: 1px solid #f1f3f4; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f8f9fa; }

    /* ── Badges statut ── */
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
    }
    .badge-en_cours  { background: #fce8b2; color: #7a4900; }
    .badge-soumis    { background: #e8f0fe; color: #1a73e8; }
    .badge-accepte   { background: #e6f4ea; color: #137333; }
    .badge-rejete    { background: #fce8e6; color: #c5221f; }
    .badge-rembourse { background: #e8eaed; color: #5f6368; }

    /* ── Alertes ── */
    .alert-error {
      background: #fce8e6;
      border: 1px solid #f5c6c3;
      color: #c5221f;
      border-radius: 4px;
      padding: 12px 16px;
      margin-bottom: 16px;
    }

    /* ── Dashboard grid ── */
    .db-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 24px;
    }
    @media (max-width: 1100px) {
      .db-grid { grid-template-columns: 1fr; }
    }

    /* ── Loader HTMX ── */
    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator { display: inline-block; }

    /* ── Page header ── */
    .page-header { margin-bottom: 24px; }
    .page-header h1 { font-size: 22px; font-weight: 600; color: #202124; }
    .page-header p  { color: #5f6368; margin-top: 4px; font-size: 13px; }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: #fff;
      border-radius: 10px;
      padding: 28px 32px;
      width: 480px;
      max-width: 95vw;
      box-shadow: 0 8px 40px rgba(0,0,0,.18);
      animation: modalIn .18s ease;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .modal-header h3 { font-size: 16px; font-weight: 600; }
    .modal-close {
      background: none;
      border: none;
      font-size: 22px;
      color: #5f6368;
      cursor: pointer;
      line-height: 1;
      padding: 0 4px;
    }
    .modal-close:hover { color: #202124; }
    .modal-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 24px; }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">Solidis <span>PAMF</span></div>
  <nav class="sidebar-nav">
    <a href="{% url 'home' %}"
       class="{% if request.resolver_match.url_name == 'home' %}active{% endif %}">
      &#9632; Tableau de bord
    </a>
    <a href="{% url 'garantie:dashboard' %}"
       class="{% if request.resolver_match.namespace == 'garantie' %}active{% endif %}">
      &#9632; Appels de garantie
    </a>
    <a href="{% url 'commission:dashboard' %}"
       class="{% if request.resolver_match.namespace == 'commission' %}active{% endif %}">
      &#9632; Commissions
    </a>
    <a href="{% url 'recouvrement:dashboard' %}"
       class="{% if request.resolver_match.namespace == 'recouvrement' %}active{% endif %}">
      &#9632; Recouvrements
    </a>
  </nav>
</aside>

<main class="main">
  {% block content %}{% endblock %}
</main>

<!-- Modal global -->
<div id="modal-overlay" class="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <div id="modal-body"></div>
  </div>
</div>

<script>
  function openModal()  { document.getElementById('modal-overlay').classList.add('open'); }
  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
    document.getElementById('modal-body').innerHTML = '';
  }
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
  document.body.addEventListener('closeModal', closeModal);
</script>

</body>
</html>
