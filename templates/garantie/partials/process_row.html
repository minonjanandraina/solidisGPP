{% if error %}
<tr>
  <td colspan="7">
    <div class="alert-error">Erreur : {{ error }}</div>
  </td>
</tr>
{% elif process %}
<script>document.getElementById('empty-row')?.remove();</script>
<tr id="process-{{ process.pk }}">
  <td>{{ process.date_from }} → {{ process.date_to }}</td>
  <td>{{ process.date_appel }}</td>
  <td>{{ process.situations.count }}</td>
  <td>{{ process.transactions.count }}</td>
  <td style="text-align:right; font-weight:600;" data-montant="{{ process.montant_total }}"></td>
  <td>
    <span class="badge badge-{{ process.statut }}">{{ process.get_statut_display }}</span>
  </td>
  <td>{{ process.reference_solidis|default:"—" }}</td>
  <td>
    <div style="display:flex; gap:6px;">
      <a href="{% url 'garantie:detail' process.pk %}" class="btn btn-sm btn-outline">Détail</a>
      <button class="btn btn-sm btn-outline"
              hx-get="{% url 'garantie:statut_form' process.pk %}"
              hx-target="#modal-body"
              hx-swap="innerHTML"
              hx-on::after-request="openModal()"
              type="button">
        Statut
      </button>
    </div>
  </td>
</tr>
{% endif %}
